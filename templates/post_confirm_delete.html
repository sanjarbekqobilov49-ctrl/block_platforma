{% extends 'base.html' %}

{% block content %}
<div class="card">
    <div class="card-body text-center">
        <h3>Postni o'chirish</h3>
        <p>"{{ post.title }}" postini o'chirmoqchimisiz?</p>
        <form method="post">
            {% csrf_token %}
            <button type="submit" class="btn btn-danger">Ha, o'chirish</button>
            <a href="{% url 'post_detail' post.id %}" class="btn btn-secondary">Bekor qilish</a>
        </form>
    </div>
</div>
{% endblock %}
